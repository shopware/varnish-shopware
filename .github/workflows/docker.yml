name: Build Docker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/docker.yml
      - 6.7/**
      - 6.8/**
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - version: "6.7"
            tags: ghcr.io/shopware/varnish:latest,ghcr.io/shopware/varnish:6.7
          - version: "6.8"
            tags: ghcr.io/shopware/varnish:6.8
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login into Github Docker Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker Images
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.version }}
          tags: ${{ matrix.tags }}
          cache-from: type=gha,scope=${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=${{ matrix.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
